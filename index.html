<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5b21b6" />
    <meta name="description" content="Malawi's Education Hub — Past Papers, Textbooks, Scholarships & Tutors" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SchoraHub" />
    <!-- Prevent layout shift / blank flash on PWA launch -->
    <style>
      html, body { margin: 0; padding: 0; background: #060818; }
      #root { min-height: 100vh; }
    </style>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register SW AFTER the page load event so it never blocks the initial render
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('[SW] Registered, scope:', reg.scope);
            })
            .catch(err => {
              console.error('[SW] Registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
